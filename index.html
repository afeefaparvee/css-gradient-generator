<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gradient Generator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #667eea,
        #764ba2
    );
}

.container{
    width:600px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.controls{
    display:flex;
    justify-content:space-around;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.preview{
    width:100%;
    height:220px;
    border-radius:10px;
    margin:20px 0;
    background:linear-gradient(90deg,#ff6b6b,#4ecdc4);
}

textarea{
    width:100%;
    height:70px;
    padding:10px;
    resize:none;
    border:1px solid #ccc;
    border-radius:8px;
}

.buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:16px;
}

.copy{
    background:#2563eb;
}

.random{
    background:#10b981;
}

button:hover{
    opacity:0.9;
}

.status{
    text-align:center;
    margin-top:10px;
    color:green;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="container">

    <h1>🎨 CSS Gradient Generator</h1>

    <div class="controls">

        <div>
            <label>Color 1</label><br>
            <input type="color" id="color1" value="#ff6b6b">
        </div>

        <div>
            <label>Color 2</label><br>
            <input type="color" id="color2" value="#4ecdc4">
        </div>

        <div>
            <label>Angle</label><br>
            <input type="range" id="angle" min="0" max="360" value="90">
            <span id="angleValue">90°</span>
        </div>

    </div>

    <div class="preview" id="preview"></div>

    <textarea id="cssCode" readonly></textarea>

    <div class="buttons">
        <button class="copy" onclick="copyCSS()">Copy CSS</button>
        <button class="random" onclick="randomGradient()">Random</button>
    </div>

    <div class="status" id="status"></div>

</div>

<script>

const color1 = document.getElementById("color1");
const color2 = document.getElementById("color2");
const angle = document.getElementById("angle");

function updateGradient(){

    const gradient =
    `linear-gradient(${angle.value}deg, ${color1.value}, ${color2.value})`;

    document.getElementById("preview").style.background =
    gradient;

    document.getElementById("cssCode").value =
    `background: ${gradient};`;

    document.getElementById("angleValue").innerText =
    angle.value + "°";
}

function randomColor(){
    return "#" +
    Math.floor(Math.random()*16777215)
    .toString(16)
    .padStart(6,"0");
}

function randomGradient(){

    color1.value = randomColor();
    color2.value = randomColor();

    updateGradient();
}

async function copyCSS(){

    await navigator.clipboard.writeText(
        document.getElementById("cssCode").value
    );

    document.getElementById("status").innerText =
    "✅ CSS Copied Successfully!";

    setTimeout(() => {
        document.getElementById("status").innerText = "";
    }, 2000);
}

color1.addEventListener("input", updateGradient);
color2.addEventListener("input", updateGradient);
angle.addEventListener("input", updateGradient);

updateGradient();

</script>

</body>
</html>
